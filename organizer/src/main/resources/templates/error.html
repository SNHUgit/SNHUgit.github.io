<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TEMPLATE_PAGE</title>
	<!-- css code found in style.css -->	
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
	<body>
		<!-- header code found in header fragment-->
    	<div th:replace="~{fragments/header :: header}"></div>
    	<div class="container">
		<!-- sidebar code found in sidebar fragment-->	
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        	<main class="content">
				
				
				<div th:fragment="messages">
				    <div th:if="${errorMessage}" class="error-box">
				        <p th:text="${errorMessage}"></p>
				    </div>
				</div>
			</main>
    	</div>
		<!-- sidebar code found in footer fragment-->	
		<div th:replace="~{fragments/footer :: footer}"></div>
	</body>
</html>
